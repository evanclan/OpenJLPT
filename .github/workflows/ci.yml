name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Validate the committed dataset against the schemas (does not hit the network).
      - run: npm run validate
      # Type-check the published loader.
      - run: npx tsc -p tsconfig.build.json --noEmit
